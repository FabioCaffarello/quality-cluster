x-service-defaults: &service-defaults
  init: true
  restart: unless-stopped
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"
  networks:
    - quality-service-network

x-go-build: &go-build
  context: ../..
  dockerfile: deploy/docker/go-service.Dockerfile

x-go-service: &go-service
  <<: *service-defaults
  stop_grace_period: 15s

services:
  nats:
    <<: *service-defaults
    image: nats:2.10.18-alpine
    command: ["-c", "/etc/nats/nats-server.conf"]
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    volumes:
      - ../nats/nats-server.conf:/etc/nats/nats-server.conf:ro
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8222/healthz >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  kafka:
    <<: *service-defaults
    image: bitnami/kafka:3.9.0
    ports:
      - "127.0.0.1:19092:19092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:19092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://127.0.0.1:19092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    profiles: ["dataplane", "all"]

  configctl:
    <<: *go-service
    build:
      <<: *go-build
      args:
        SERVICE: configctl
    image: quality-service/configctl:dev
    command: ["-config", "/etc/quality-service/configctl.jsonc"]
    volumes:
      - ../configs/configctl.jsonc:/etc/quality-service/configctl.jsonc:ro
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -r /proc/1/cmdline && grep -qa '/usr/local/bin/service' /proc/1/cmdline"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    profiles: ["core", "all"]

  server:
    <<: *go-service
    build:
      <<: *go-build
      args:
        SERVICE: server
    image: quality-service/server:dev
    command: ["-config", "/etc/quality-service/server.jsonc"]
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ../configs/server.jsonc:/etc/quality-service/server.jsonc:ro
    depends_on:
      nats:
        condition: service_healthy
      configctl:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/readyz | grep -q 'ready'"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    profiles: ["core", "all"]

  validator:
    <<: *go-service
    build:
      <<: *go-build
      args:
        SERVICE: validator
    image: quality-service/validator:dev
    command: ["-config", "/etc/quality-service/validator.jsonc"]
    volumes:
      - ../configs/validator.jsonc:/etc/quality-service/validator.jsonc:ro
    depends_on:
      nats:
        condition: service_healthy
      configctl:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -r /proc/1/cmdline && grep -qa '/usr/local/bin/service' /proc/1/cmdline"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    profiles: ["runtime", "all"]

  consumer:
    <<: *go-service
    build:
      <<: *go-build
      args:
        SERVICE: consumer
    image: quality-service/consumer:dev
    command: ["-config", "/etc/quality-service/consumer.jsonc"]
    volumes:
      - ../configs/consumer.jsonc:/etc/quality-service/consumer.jsonc:ro
    depends_on:
      nats:
        condition: service_healthy
      server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -r /proc/1/cmdline && grep -qa '/usr/local/bin/service' /proc/1/cmdline"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    profiles: ["dataplane", "all"]

  emulator:
    <<: *go-service
    build:
      <<: *go-build
      args:
        SERVICE: emulator
    image: quality-service/emulator:dev
    command: ["-config", "/etc/quality-service/emulator.jsonc"]
    volumes:
      - ../configs/emulator.jsonc:/etc/quality-service/emulator.jsonc:ro
    depends_on:
      server:
        condition: service_healthy
      kafka:
        condition: service_healthy
      consumer:
        condition: service_healthy
      validator:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -r /proc/1/cmdline && grep -qa '/usr/local/bin/service' /proc/1/cmdline"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    profiles: ["dataplane", "all"]

networks:
  quality-service-network:
    driver: bridge

volumes:
  nats_data:
  kafka_data:
